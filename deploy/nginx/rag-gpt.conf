# Replace `your-domain.com` and certificate paths before using this file in production.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream rag_gpt_frontend {
    server 127.0.0.1:3000;
}

upstream rag_gpt_kernel {
    server 127.0.0.1:8000;
}

upstream rag_gpt_gateway {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    client_max_body_size 512m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /ws {
        proxy_pass http://rag_gpt_gateway/ws;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    location /api/admin/ {
        proxy_pass http://rag_gpt_kernel;
    }

    location /api/library/ {
        proxy_pass http://rag_gpt_kernel;
    }

    location /api/tasks/ {
        proxy_pass http://rag_gpt_kernel;
    }

    location / {
        proxy_pass http://rag_gpt_frontend;
    }
}

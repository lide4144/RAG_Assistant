pid /home/programer/RAG_GPTV1.0/.runtime/cloudstudio-nginx/nginx.pid;

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    access_log /home/programer/RAG_GPTV1.0/.runtime/cloudstudio-nginx/access.log;
    error_log /home/programer/RAG_GPTV1.0/.runtime/cloudstudio-nginx/error.log;

    server {
        listen 127.0.0.1:9000;
        server_name _;

        client_max_body_size 512m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /_next/webpack-hmr {
            proxy_pass http://127.0.0.1:3000/_next/webpack-hmr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /ws {
            proxy_pass http://127.0.0.1:8080/ws;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        location /api/admin/ {
            proxy_pass http://127.0.0.1:8000;
        }

        location /api/library/ {
            proxy_pass http://127.0.0.1:8000;
        }

        location /api/tasks/ {
            proxy_pass http://127.0.0.1:8000;
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
        }
    }
}
